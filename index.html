<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}
</style>
</head>

<body>

<h1>🔥 نقاطك 🔥</h1>
<h2>عدد النقاط: <span id="score">0</span></h2>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB9NqY4AVGS4dRI8HYvWAvHD3o0ppdW18k",
  authDomain: "skins-app-82ddb.firebaseapp.com",
  databaseURL: "https://skins-app-82ddb-default-rtdb.firebaseio.com",
  projectId: "skins-app-82ddb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 👤 المستخدم */
let userId = localStorage.getItem("userId");
let username = localStorage.getItem("username");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("userId", userId);
}

if (!username) {
  username = prompt("اكتب اسمك:");
  if (!username) username = "لاعب";
  localStorage.setItem("username", username);
}

/* 🕛 تاريخ اليوم */
function getTodayDate(){
  let d = new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

/* 📊 تحميل النقاط */
function loadPoints(){

  const userRef = db.ref("users/" + userId);

  userRef.once("value").then((snap)=>{

    let data = snap.val();

    let points = data ? data.points : 0;
    let lastDay = data ? data.lastDay : null;

    let today = getTodayDate();

    /* 🔥 تصفير يومي */
    if(lastDay !== today){

      points = 0;

      userRef.set({
        name: username,
        points: 0,
        lastDay: today
      });

    }

    document.getElementById("score").innerText = points;

  });

}

/* تشغيل */
document.addEventListener("DOMContentLoaded", function(){
  loadPoints();
});
</script>

</body>
</html>
<p>TEST</p>

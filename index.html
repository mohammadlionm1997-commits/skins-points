<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}
</style>
</head>

<body>

<h1>🔥 نقاطك 🔥</h1>
<h2>عدد النقاط: <span id="score">0</span></h2>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB9NqY4AVGS4dRI8HYvWAvHD3o0ppdW18k",
  authDomain: "skins-app-82ddb.firebaseapp.com",
  databaseURL: "https://skins-app-82ddb-default-rtdb.firebaseio.com",
  projectId: "skins-app-82ddb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 👤 المستخدم */
let userId = localStorage.getItem("userId");
let username = localStorage.getItem("username");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("userId", userId);
}

if (!username) {
  username = prompt("اكتب اسمك:");
  if (!username) username = "لاعب";
  localStorage.setItem("username", username);
}

/* 📊 تحميل النقاط */
function loadPoints(){

  const userRef = db.ref("users/" + userId);
  const resetRef = db.ref("resetTime");

  Promise.all([userRef.once("value"), resetRef.once("value")])
  .then(([userSnap, resetSnap])=>{

    let data = userSnap.val();
    let resetTime = resetSnap.val();

    let points = data ? data.points : 0;
    let lastUpdate = data ? data.lastUpdate : null;

    if (resetTime && lastUpdate) {
      if (new Date(lastUpdate).getTime() < new Date(resetTime).getTime()) {

        points = 0;

        userRef.update({
          points: 0
        });
      }
    }

    document.getElementById("score").innerText = points;

  });

}

/* ➕ إضافة نقاط */
function addPoints(value){

  const userRef = db.ref("users/" + userId);

  userRef.once("value").then((snap)=>{

    let data = snap.val();

    let current = data ? data.points : 0;
    let newPoints = current + value;

    userRef.update({
      name: username,
      points: newPoints,
      lastUpdate: new Date().toISOString()
    });

    document.getElementById("score").innerText = newPoints;

  });

}

/* تشغيل */
document.addEventListener("DOMContentLoaded", function(){
  loadPoints();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎮 اختر الإجابة الصحيحة</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:15px;
}

.container {
  max-width:400px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  transition:0.2s;
}

h1 {color:#00ffaa;}

img {
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

.btn {
  display:block;
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:white;
  cursor:pointer;
}

/* صح */
.correct {
  background:#22c55e !important;
}

/* خطأ */
.wrong {
  background:#ef4444 !important;
}

/* اهتزاز */
@keyframes shake {
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}
.shake {animation:shake 0.3s;}

/* توهج */
.glow {
  box-shadow:0 0 20px #22c55e;
}
</style>

</head>

<body>

<div class="container" id="quizBox">

<h1>🎮 اختر الإجابة</h1>

<div>النقاط: <span id="score">0</span></div>

<img id="image">

<div id="question"></div>

<div id="answers"></div>

</div>

<!-- 🔊 أصوات -->
<audio id="correctSound" src="https://s5files.mobeasy.com/static/u/47558/file-47558-301122.mp3"></audio>
<audio id="wrongSound" src="https://s5files.mobeasy.com/static/u/47558/file-47558-45173.mp3"></audio>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB9NqY4AVGS4dRI8HYvWAvHD3o0ppdW18k",
  databaseURL: "https://skins-app-82ddb-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 👤 user ثابت لكل التطبيق */
const db = firebase.database();

/* 👤 المستخدم */
let userId = localStorage.getItem("userId");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("userId", userId);
}

let username = localStorage.getItem("username");

if (!username) {
  username = prompt("اكتب اسمك:");
  if (!username) username = "لاعب";
  localStorage.setItem("username", username);
}

/* 🔥 إضافة نقاط */
function addPoints(value){
  db.ref("users/" + userId).once("value").then(snap=>{
    let current = snap.val() ? snap.val().points : 0;

    db.ref("users/" + userId).update({
      name: username,
      points: current + value,
      lastUpdate: new Date().toISOString()
    });
  });
}

/* 📊 الأسئلة (ضيف هون براحتك) */
let questions = [
{
q:"ما هي ذخيرة AWM؟",
img:"https://i.postimg.cc/YSN5bkNy/1.png",
a:["7.62","5.56",".300 Magnum","9mm"],
correct:2
},
{
q:"أفضل خوذة؟",
img:"https://i.postimg.cc/g0yCNdyS/3.png",
a:["1","2","3","لا فرق"],
correct:2
},
{
q:"سلاح قنص؟",
img:"https://i.postimg.cc/3wjsn7jL/4.png",
a:["SMG","AR","SR","Shotgun"],
correct:2
}
];

let current = 0;
let score = 0;

function loadQuestion(){

let q = questions[current];

document.getElementById("question").innerText = q.q;
document.getElementById("image").src = q.img;

let answersDiv = document.getElementById("answers");
answersDiv.innerHTML = "";

q.a.forEach((ans,i)=>{

let btn = document.createElement("button");
btn.className="btn";
btn.innerText=ans;

btn.onclick = ()=>{

let buttons = document.querySelectorAll(".btn");

buttons.forEach((b,index)=>{
if(index===q.correct) b.classList.add("correct");
if(index===i && i!==q.correct) b.classList.add("wrong");
});

if(i === q.correct){

score += 3;
document.getElementById("score").innerText = score;

/* صوت صح */
document.getElementById("correctSound").play();

/* تأثير */
document.getElementById("quizBox").classList.add("glow");
setTimeout(()=>document.getElementById("quizBox").classList.remove("glow"),300);

/* 🔥 إضافة لفايربيس */
addPoints(3);

}else{

/* صوت خطأ */
document.getElementById("wrongSound").play();

/* اهتزاز */
document.getElementById("quizBox").classList.add("shake");
setTimeout(()=>document.getElementById("quizBox").classList.remove("shake"),300);
}

buttons.forEach(b=>b.disabled=true);

setTimeout(()=>{
current++;
if(current < questions.length){
loadQuestion();
}else{
alert("خلصت اللعبة 🎉 مجموعك: " + score);
}
},1000);

};

answersDiv.appendChild(btn);

});

}

loadQuestion();

</script>

</body>
</html>
